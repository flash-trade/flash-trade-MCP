name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "mcp/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "mcp/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: mcp

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build
